<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<style>
			/* --- THEME VARIABLES --- */
			/* Dark Mode (Default) */
			:root,
			:root[data-theme='dark'] {
				--bg-primary: #202124;
				--text-primary: #e8eaed;
				--bg-secondary: #292a2d;
				--border-main: #3c4043;
				--border-input: #5f6368;
				--text-muted: #9aa0a6;
				--btn-outline-bg: #303134;
				--btn-outline-hover: #434446;
				--btn-disabled-bg: #3c4043;
				--btn-disabled-text: #5f6368;
				--url-count-bg: rgba(26, 115, 232, 0.2);
			}

			/* Light Mode (Explicitly set to 'light') */
			:root[data-theme='light'] {
				--bg-primary: #ffffff;
				--text-primary: #333333;
				--bg-secondary: #f5f7f9;
				--border-main: #e1e4e8;
				--border-input: #cccccc;
				--text-muted: #666666;
				--btn-outline-bg: #ffffff;
				--btn-outline-hover: #e9e9e9;
				--btn-disabled-bg: #e0e0e0;
				--btn-disabled-text: #9e9e9e;
				--url-count-bg: #e8f0fe;
			}

			/* Light Mode (System setting) */
			@media (prefers-color-scheme: light) {
				:root:not([data-theme='dark']) {
					--bg-primary: #ffffff;
					--text-primary: #333333;
					--bg-secondary: #f5f7f9;
					--border-main: #e1e4e8;
					--border-input: #cccccc;
					--text-muted: #666666;
					--btn-outline-bg: #ffffff;
					--btn-outline-hover: #e9e9e9;
					--btn-disabled-bg: #e0e0e0;
					--btn-disabled-text: #9e9e9e;
					--url-count-bg: #e8f0fe;
				}
			}

			html {
				display: flex;
				justify-content: center;
			}

			/* --- BASE STYLES --- */
			body {
				flex-grow: 1;
				font-family: system-ui, sans-serif;
				min-width: 400px;
				max-width: 700px;
				padding: 16px;
				padding-top: 0;
				margin: 0;
				color: var(--text-primary);
				background: var(--bg-primary);
				transition:
					background 0.3s,
					color 0.3s;
			}
			h3 {
				margin-top: 0;
				margin-bottom: 10px;
				font-size: 15px;
			}
			label {
				display: block;
				font-weight: 600;
				font-size: 13px;
				margin-bottom: 4px;
			}

			/* --- HEADER --- */
			.top-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				position: relative;
			}
			.top-header h2 {
				margin: 0;
				font-size: 18px;
			}
			#reload {
				display: flex;
				align-items: center;
				justify-content: center;
				background: none;
				border: none;
				padding: 0;
				margin: 0;
				border-radius: 50px;
				overflow: hidden;
			}
			#logo {
				width: 50px;
				height: 50px;
			}
			#themeToggle {
				display: flex;
				align-items: center;
				justify-content: center;
				background: none;
				border: none;
				font-size: 25px;
				cursor: pointer;
				padding: 4px;
				border-radius: 50%;
				width: 50px;
				height: 50px;
				line-height: 0;
				transition: background 0.2s;
			}
			#themeToggle:hover {
				background: var(--bg-secondary);
			}

			/* --- COMPONENTS --- */
			.section {
				background: var(--bg-secondary);
				padding: 12px;
				border-radius: 6px;
				margin-bottom: 12px;
				border: 1px solid var(--border-main);
				transition:
					background 0.3s,
					border-color 0.3s;
			}
			.header-row {
				display: flex;
				justify-content: space-between;
				align-items: baseline;
			}
			.url-count {
				font-size: 12px;
				font-weight: bold;
				color: #8ab4f8;
				background: var(--url-count-bg);
				padding: 2px 6px;
				border-radius: 10px;
				transition: background 0.3s;
			}

			textarea,
			input[type='text'],
			select {
				width: 100%;
				box-sizing: border-box;
				margin-bottom: 10px;
				padding: 8px;
				border: 1px solid var(--border-input);
				border-radius: 4px;
				font-family: monospace;
				font-size: 12px;
				background: var(--bg-primary);
				color: var(--text-primary);
				transition:
					background 0.3s,
					color 0.3s,
					border-color 0.3s;
			}
			textarea {
				height: 90px;
				resize: vertical;
			}
			textarea::placeholder,
			input[type='text']::placeholder {
				color: var(--text-muted);
			}
			.hint {
				font-size: 11px;
				color: var(--text-muted);
				margin-top: -8px;
				margin-bottom: 12px;
				transition: color 0.3s;
			}

			.row {
				display: flex;
				gap: 8px;
				margin-bottom: 8px;
				align-items: stretch;
			}

			/* --- BUTTONS --- */
			button,
			.btn-label {
				padding: 8px 12px;
				border: none;
				border-radius: 4px;
				font-size: 12px;
				font-weight: bold;
				cursor: pointer;
				transition:
					background 0.2s,
					color 0.2s,
					border-color 0.2s;
				box-sizing: border-box;
				display: inline-block;
				text-align: center;
			}
			.btn-primary {
				background: #1a73e8;
				color: white;
			}
			.btn-primary:hover {
				background: #1557b0;
			}
			.btn-outline {
				border: 1px solid var(--border-input);
				background: var(--btn-outline-bg);
				color: var(--text-primary);
			}
			.btn-outline:hover {
				background: var(--btn-outline-hover);
			}
			.btn-danger {
				background: #f44336;
				color: white;
			}
			.btn-danger:hover {
				background: #d32f2f;
			}
			.btn-success {
				background: #4caf50;
				color: white;
			}
			.btn-success:hover {
				background: #45a049;
			}

			button:disabled,
			.btn-label.disabled {
				background: var(--btn-disabled-bg) !important;
				color: var(--btn-disabled-text) !important;
				border-color: transparent !important;
				cursor: not-allowed;
				pointer-events: none;
			}

			.status-text {
				font-size: 12px;
				font-weight: bold;
				opacity: 0;
				transition: opacity 0.3s;
				text-align: center;
			}
		</style>
	</head>
	<body>
		<div class="top-header">
			<button id="reload"><img id="logo" title="Link Runner" src="assets/images/icon.svg" /></button>
			<h1>Link Runner</h1>
			<button id="themeToggle" title="Theme: System">🌓</button>
		</div>

		<div class="section">
			<div class="header-row">
				<h3>Links to Run:</h3>
				<span id="urlCount" class="url-count">0</span>
			</div>

			<textarea id="urlList" placeholder="https://example.com/1&#10;https://example.com/2"></textarea>

			<label>Destination URL:</label>
			<input type="text" id="destUrl" placeholder="e.g. /success or thank-you" />

			<label>Destination Element Selector:</label>
			<input type="text" id="destSelector" placeholder="e.g. #success-message or .done" />

			<label>Condition Logic:</label>
			<select id="conditionLogic">
				<option value="AND">AND (Both conditions must be met)</option>
				<option value="OR">OR (Either condition is sufficient)</option>
			</select>
			<div class="hint">If only one input is filled, this setting is ignored.</div>

			<div class="row" style="margin-top: 15px">
				<button id="startBtn" class="btn-success" style="flex: 1; padding: 12px">Start</button>
				<button id="stopBtn" class="btn-danger" style="flex: 1; padding: 12px">Stop</button>
			</div>
		</div>

		<div class="section">
			<h3>Link Collector</h3>
			<label>Open Tab Match (Partial URL):</label>
			<input type="text" id="tabMatch" placeholder="e.g. /products/ or store.com" />

			<label>Anchor Tag Selector:</label>
			<input type="text" id="anchorSelector" placeholder="e.g. a.next-page-link" />

			<button id="collectBtn" class="btn-primary" style="width: 100%">Collect Links from Tabs</button>
			<div id="collectStatus" class="status-text" style="margin-top: 6px"></div>
		</div>

		<div class="section">
			<h3>Profiles & Data</h3>

			<div class="row">
				<input type="text" id="profileName" placeholder="New Profile Name" style="margin-bottom: 0" />
				<button id="saveProfileBtn" class="btn-primary" style="white-space: nowrap">Save As</button>
			</div>

			<div class="row">
				<select id="profileSelect" style="margin-bottom: 0">
					<option value="">-- Saved Profiles --</option>
				</select>
				<button id="loadProfileBtn" class="btn-outline">Load</button>
				<button id="deleteProfileBtn" class="btn-danger">Delete</button>
			</div>

			<div class="row" style="margin-top: 12px">
				<button id="exportBtn" class="btn-outline" style="flex: 1">Export JSON</button>
				<label for="importFile" id="importLabel" class="btn-label btn-outline" style="flex: 1">Import JSON</label>
				<input type="file" id="importFile" accept=".json" style="display: none" />
			</div>
		</div>

		<script src="popup.js"></script>
	</body>
</html>
