<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			body {
				font-family: system-ui, sans-serif;
				width: 340px;
				padding: 16px;
				margin: 0;
				color: #333;
			}
			label {
				display: block;
				margin-top: 12px;
				font-weight: 600;
				font-size: 13px;
			}
			textarea,
			input {
				width: 100%;
				box-sizing: border-box;
				margin-top: 6px;
				padding: 8px;
				border: 1px solid #ccc;
				border-radius: 4px;
				font-family: monospace;
			}
			textarea {
				height: 120px;
				resize: vertical;
			}
			.hint {
				font-size: 11px;
				color: #666;
				margin-top: 4px;
			}

			.save-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				margin-top: 15px;
			}
			#saveBtn {
				padding: 6px 12px;
				border: 1px solid #ccc;
				background: #f9f9f9;
				border-radius: 4px;
				cursor: pointer;
				font-size: 12px;
			}
			#saveBtn:hover {
				background: #e9e9e9;
			}
			#saveStatus {
				color: #4caf50;
				font-size: 12px;
				font-weight: bold;
				opacity: 0;
				transition: opacity 0.3s;
			}

			.buttons {
				display: flex;
				gap: 10px;
				margin-top: 15px;
			}
			button {
				flex: 1;
				padding: 10px;
				border: none;
				border-radius: 4px;
				font-weight: bold;
				cursor: pointer;
				transition: background 0.2s;
			}
			#startBtn {
				background: #4caf50;
				color: white;
			}
			#startBtn:hover {
				background: #45a049;
			}
			#stopBtn {
				background: #f44336;
				color: white;
			}
			#stopBtn:hover {
				background: #d32f2f;
			}
			button:disabled {
				background: #e0e0e0 !important;
				color: #9e9e9e !important;
				cursor: not-allowed;
			}
		</style>
	</head>
	<body>
		<h2 style="margin-top: 0">Sequence Settings</h2>

		<label for="urlList">List of Links (one per line):</label>
		<textarea id="urlList" placeholder="https://example.com/1&#10;https://example.com/2"></textarea>

		<label for="destUrl">Destination URL:</label>
		<input type="text" id="destUrl" placeholder="e.g. /success or thank-you" />
		<div class="hint">Wait until the current URL contains this string.</div>

		<label for="destSelector">Destination Element Selector:</label>
		<input type="text" id="destSelector" placeholder="e.g. #success-message or .done" />
		<div class="hint">Wait until this CSS selector exists on the page.</div>

		<div class="save-row">
			<button id="saveBtn">Save Settings</button>
			<span id="saveStatus">Saved!</span>
		</div>

		<div class="buttons">
			<button id="startBtn">Start</button>
			<button id="stopBtn">Stop</button>
		</div>

		<script src="popup.js"></script>
	</body>
</html>
