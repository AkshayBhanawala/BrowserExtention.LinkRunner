name: Build Extension

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Node version check
        run: node -v

      - name: NPM version check
        run: npm -v

      - name: Install dependencies
        run: npm i

      - name: Build Package
        run: npm run build

      - name: Read extension version
        id: versions
        run: |
          ext_version=$(node -p "JSON.parse(require('fs').readFileSync('src/manifest.json', 'utf8')).version.split('.').join('')")
          echo "ext_version=$ext_version" >> "$GITHUB_OUTPUT"

      - name: Archive extension
        working-directory: dist
        run: zip -r "LinkRunner.v${{ steps.versions.outputs.ext_version }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: LinkRunner.v${{ steps.versions.outputs.ext_version }}.zip
          path: dist/LinkRunner.v${{ steps.versions.outputs.ext_version }}.zip
          archive: false
